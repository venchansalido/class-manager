<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roll Call — Attendance Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Everything below is rendered/replaced by JS. No page ever navigates away
       from index.html — router.js swaps the contents of #view. -->
  <div id="app">
    <div id="toast-region" aria-live="polite"></div>
    <div id="view" class="view">
      <!-- injected at runtime -->
      <div class="boot-loader">
        <div class="boot-mark" aria-hidden="true">✓</div>
        <p>Loading Roll Call…</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
